name: Build
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21, 25]
    name: Build - Java ${{ matrix.java }}
    runs-on: ubuntu-24.04
    env:
      MAVEN_ARGS: -B --color always
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Get project version
        run: |
          PROJECT_VERSION="$(mvn -Dexpression=project.version -q help:evaluate)"
          echo "PROJECT_VERSION=$PROJECT_VERSION" | tee -a "$GITHUB_ENV"
      - name: Build
        run: mvn clean install
      - name: Build example - simple-java
        run: mvn -Dorika-spring-boot-starter.version="$PROJECT_VERSION" clean install
        working-directory: examples/simple-java
      - name: Build example - simple-kotlin
        run: mvn -Dorika-spring-boot-starter.version="$PROJECT_VERSION" clean install
        working-directory: examples/simple-kotlin
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          use_oidc: true
